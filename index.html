<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AppDIGI</title>

<meta name="theme-color" content="#191970">
<meta name="description" content="AppDIGI">

<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* ===================== ROOT ===================== */
:root{
  --bg:#eef2f7;
  --card:#fff;
  --text:#111827;
  --primary:#2563eb;
  --success:#16a34a;
  --danger:#dc2626;
  --warning:#facc15;
  --border:#d1d5db;
}

body{
  margin:0;
  font-family:Poppins;
  background:var(--bg);
  color:var(--text);
  padding:20px;
}
.header{
  position:sticky;
  top:0;
  z-index:100;
  background:var(--card);
  padding:12px 18px;
  border-radius:16px;
  margin-bottom:15px;
  box-shadow:0 6px 15px rgba(0,0,0,.08);
}

.brand{
  display:flex;
  align-items:center;
  gap:12px;
}

.logo{
  width:45px;
  height:45px;
}

.logo img{
  width:100%;
  height:100%;
  object-fit:contain;
}

.brand h2{
  margin:0;
}

/* ===================== LAYOUT ===================== */
.container{
  max-width:1200px;
  margin:auto;
}

.card{
  background:var(--card);
  padding:18px;
  border-radius:16px;
  margin-bottom:15px;
  box-shadow:0 10px 25px rgba(0,0,0,.08);
}
  
/* ===================== FORM ===================== */
.form{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));
  gap:18px;
}

.field{
  display:flex;
  flex-direction:column;
}

.field label{
  font-size:12px;
  margin-bottom:6px;
  opacity:0.7;
}

.field input,
.field select{
  padding:10px;
  border:1px solid var(--border);
  border-radius:10px;
  outline:none;
}

/* ===================== STATS ===================== */
.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(120px, 1fr));
  gap:10px;
}

.box{
  padding:15px;
  border-radius:12px;
  color:#fff;
}

.g{background:var(--success)}
.y{background:var(--warning);color:#111}
.r{background:var(--danger)}
.b{background:var(--primary)}

/* ===================== CALENDAR ===================== */
.days{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:8px;
  margin-top:12px;
}

.headerDay{
  background:var(--primary);
  color:#fff;
  padding:10px;
  text-align:center;
  border-radius:10px;
  font-size:12px;
  font-weight:600;
}

.day{
  border:1px solid var(--border);
  padding:10px;
  border-radius:12px;
  min-height:70px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-weight:600;
  cursor:pointer;
  transition:.15s;
}

.day:hover{
  transform:translateY(-2px);
  box-shadow:0 6px 15px rgba(0,0,0,.08);
}

.day small{
  font-size:11px;
  opacity:.7;
  margin-top:3px;
}

/* STATUS */
.masuk{background:#16a34a;color:#fff}
.setengah{background:#facc15;color:#111}
.alfa{background:#dc2626;color:#fff}
.libur{background:#6b7280;color:#fff}

/* WEEK */
.week-summary{
  grid-column:1/-1;
  background:rgba(0,0,0,0.04);
  padding:6px 10px;
  border-radius:10px;
  font-size:12px;
}

@media (max-width:768px){
  .days{
    grid-template-columns:repeat(2,1fr);
  }
}

  .btn-danger {
  padding: 10px 16px;
  border-radius: 12px;
  background: #dc2626;
  color: white;
  border: none;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.btn-danger:active {
  transform: scale(0.97);
}
  
/* TAMBAHAN DARK MODE */
body.dark {
  background: #121212;
  color: #ffffff;
}

body.dark .container,
body.dark .card,
body.dark .box {
  background: #1e1e1e;
  color: #ffffff;
}

body.dark input,
body.dark select,
body.dark textarea {
  background: #2b2b2b;
  color: #ffffff;
  border: 1px solid #555;
}

body.dark .header {
  background: #0d0d0d;
}
 .install-wrapper {
    text-align: center;
    margin: 20px 0;
  }

  .btn-install {
    padding: 10px 16px;
    border-radius: 12px;
    background: #191970;
    color: white;
    border: none;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  }

  .btn-install:active {
    transform: scale(0.97);
  }
  
.report-summary{
  display:grid;
  grid-template-columns:1fr 2fr;
  gap:20px;
  margin-top:20px;
}

.legend-box,
.salary-box{
  border:1px solid #ddd;
  border-radius:12px;
  padding:15px;
  background:#fff;
}

.salary-box .row{
    display:flex;
    justify-content:space-between;
    padding:8px 0;
    border-bottom:1px solid #eee;
}

.salary-box .total{
    font-size:20px;
    font-weight:bold;
    color:#2563eb;
} 

.report-title{
  text-align:center;
  margin-bottom:20px;
}

.report-title h1{
  margin:0;
  font-size:24px;
}

.report-title h2{
  margin:5px 0 0;
  font-size:16px;
  color:#666;
}

.report-summary{
  page-break-inside:avoid;
}

.card{
  page-break-inside:avoid;
  
}  
  
#capture-area {
  width: 100%;
  padding: 20px;
  background: #fff;

  font-family: Arial, sans-serif;
  color: #000;

  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: geometricPrecision;
}
  
.report-summary,
.legend-box,
.salary-box,
.card {
  overflow: visible;
  min-height: auto;
}
</style>
  
</head>
  
<body>

<div id="capture-area">

  <header class="header">
    <div class="brand">
      <div class="logo">
        <img src="./logo.png" alt="Logo AppDIGI">
      </div>
      <h2>AppDIGI</h2>
    </div>
  </header>
  
<div class="report-title">
  <h1>AppDIGI REPORT</h1>
  <h2 id="periodeText">Periode : Juni 2025</h2>
</div>
  
<!-- INPUT -->
<div class="card">
    <div class="form">

        <!-- BARIS 1 -->
        <div class="field"><label>Nama Karyawan</label><input id="nama"></div>
        <div class="field"><label>Gaji Pokok</label><input id="pokok"></div>
        <div class="field"><label>Gaji Harian</label><input id="harian"></div>
        <div class="field"><label>Insentif Mingguan</label><input id="insentif"></div>

        <!-- BARIS 2 -->
        <div class="field"><label>Bon</label><input id="bon"></div>

        <div class="field">
            <label>Libur</label>
            <select id="libur">
                <option value="">Pilih Libur</option>
                <option value="minggu">Minggu</option>
                <option value="sabtu">Sabtu</option>
                <option value="sabtu-minggu">Sabtu & Minggu</option>
            </select>
        </div>

        <div class="field">
            <label>Bulan</label>
            <select id="bulan">
                <option value="">Pilih Bulan</option>
            </select>
        </div>

        <div class="field">
            <label>Tahun</label>
            <select id="tahun">
                <option value="">Pilih Tahun</option>
            </select>
        </div>

    </div>
</div>
   
<!-- DASHBOARD -->
<div class="card">
<div class="stats">
<div class="box g">Hadir <h3 id="h">0</h3></div>
<div class="box y">Setengah <h3 id="s">0</h3></div>
<div class="box r">Alfa <h3 id="a">0</h3></div>
<div class="box b">Total <h3 id="t">Rp 0</h3></div>
</div>
</div>

  <div class="card report-summary">

  <div class="salary-box">
    <h3>Ringkasan Gaji</h3>

    <div class="row">
      <span>Gaji Pokok</span>
      <b id="rPokok">Rp 0</b>
    </div>

    <div class="row">
      <span>Bon</span>
      <b id="rBon">Rp 0</b>
    </div>

    <div class="row total">
      <span>Total Gaji</span>
      <b id="rTotal">Rp 0</b>
    </div>

  </div>

</div>
  
  <div class="install-wrapper">
  <button onclick="installApp()" class="btn-install">
    Install App
  </button>
</div>
  
<!-- CALENDAR -->
<div class="card">
    <div id="cal"></div>
</div>
  
<!-- ACTION BUTTONS -->
<div class="card">
    <div class="action-buttons">

        <button class="btn-dark" onclick="document.body.classList.toggle('dark')">Dark</button>

        <button class="btn-success" onclick="backup()">Backup</button>

        <button class="btn-primary" onclick="document.getElementById('file').click()">Restore</button>

        <button class="btn-success" onclick="downloadPDF()">📄 PDF</button>

        <button class="btn-primary" onclick="downloadJPG()">🖼️ JPG</button>
      
        <button class="btn-danger" onclick="resetApp()">🔄 Reset</button>
      
    </div>

    <input type="file" id="file" hidden>
</div>

</div>
  
</body>
  
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>


let data={};

const bulan=document.getElementById("bulan");
const tahun=document.getElementById("tahun");

const rPokok = document.getElementById("rPokok");
const rBon = document.getElementById("rBon");
const rTotal = document.getElementById("rTotal");
  
const m=["Jan","Feb","Mar","Apr","Mei","Jun","Jul","Agu","Sep","Okt","Nov","Des"];

m.forEach((b,i)=>bulan.innerHTML+=`<option value="${i}">${b}</option>`);
for(let y=2025;y<=2035;y++)tahun.innerHTML+=`<option>${y}</option>`;

/* KEY */
function key(y,b,t){return y+"-"+b+"-"+t}

/* FORMAT */
function rp(n){
return Number(n||0).toLocaleString("id-ID");
}

function num(v){
return Number(String(v||"").replace(/\D/g,""))||0;
}

function formatInputRupiah(el){

    el.addEventListener("input",function(){

        let angka=this.value.replace(/\D/g,'');

        if(!angka){
            this.value='';
            calc();
            return;
        }

        this.value=Number(angka).toLocaleString("id-ID");

        calc();

    });
}

/* SAVE LOAD */
function save(){
localStorage.setItem("AppDIGI",JSON.stringify(data));
}

function load(){
data=JSON.parse(localStorage.getItem("AppDIGI")||"{}");
}

/* WEEK KEY */
function weekKey(date){
let d=new Date(date);
let day=d.getDay();
day=day===0?7:day;
d.setDate(d.getDate()-(day-1));
return d.getFullYear()+"-"+d.getMonth()+"-"+d.getDate();
}

/* CALC (REALTIME FIXED) */

function calc(){

let h=0,s=0,a=0;
let total=0;

let weekly={};

const harianVal=num(harian.value);
const insentifVal=num(insentif.value);

const currentYear=Number(tahun.value);
const currentMonth=Number(bulan.value);

Object.entries(data).forEach(([k,v])=>{

    let [y,b,t]=k.split("-").map(Number);

    if(y!==currentYear || b!==currentMonth){
        return;
    }

    let d=new Date(y,b,t);

    let w=weekKey(d);

    if(!weekly[w]){
        weekly[w]={h:0,s:0,a:0};
    }

    if(v==="masuk"){
        h++;
        weekly[w].h++;
        total+=harianVal;
    }
    else if(v==="setengah"){
        s++;
        weekly[w].s++;
        total+=harianVal/2;
    }
    else if(v==="alfa"){
        a++;
        weekly[w].a++;
    }

});

let insentifTotal=0;

Object.values(weekly).forEach(w=>{

    if(w.a>0)return;

    let score=w.h+(w.s*0.5);

    if(score>=6){
        insentifTotal+=insentifVal;
    }

});

total+=num(pokok.value)+insentifTotal-num(bon.value);

document.getElementById("h").innerText=h;
document.getElementById("s").innerText=s;
document.getElementById("a").innerText=a;
document.getElementById("t").innerText="Rp "+rp(total);

rPokok.innerText = "Rp " + rp(num(pokok.value));
rBon.innerText = "Rp " + rp(num(bon.value));
rTotal.innerText = "Rp " + rp(total);

document.getElementById("periodeText").innerText =
  "Periode : " + m[bulan.value] + " " + tahun.value;
}
  
/* CALENDAR */

function build(){

let y=+tahun.value;
let b=+bulan.value;

let max=new Date(y,b+1,0).getDate();
let start=new Date(y,b,1).getDay();
start=start===0?6:start-1;

let cal=document.getElementById("cal");
cal.innerHTML="";

let grid=document.createElement("div");
grid.className="days";

const hari=["Sen","Sel","Rab","Kam","Jum","Sab","Min"];

hari.forEach(h=>{
let d=document.createElement("div");
d.className="headerDay";
d.innerText=h;
grid.appendChild(d);
});

for(let i=0;i<start;i++){
let e=document.createElement("div");
e.className="empty";
grid.appendChild(e);
}

for(let i=1;i<=max;i++){

let k=key(y,b,i);
let d=new Date(y,b,i);

let cell=document.createElement("div");
cell.className="day";

if(data[k])cell.classList.add(data[k]);

cell.innerHTML=`<div>${i}</div><small>${data[k]||""}</small>`;

cell.onclick=()=>{

if(!data[k])data[k]="masuk";
else if(data[k]==="masuk")data[k]="setengah";
else if(data[k]==="setengah")data[k]="alfa";
else delete data[k];

save();
build();
calc(); // REALTIME SYNC FIX
};

grid.appendChild(cell);
}

cal.appendChild(grid);
}

/* INPUT CHANGE = FULL SYNC */
document.querySelectorAll("input,select").forEach(e=>{
e.addEventListener("input",()=>{save();build();calc();});
e.addEventListener("change",()=>{save();build();calc();});
});

/* BACKUP */
function backup(){
let b=new Blob([JSON.stringify(data)],{type:"application/json"});
let a=document.createElement("a");
a.href=URL.createObjectURL(b);
a.download="AppDIGI.json";
a.click();
}

formatInputRupiah(document.getElementById("pokok"));
formatInputRupiah(document.getElementById("harian"));
formatInputRupiah(document.getElementById("insentif"));
formatInputRupiah(document.getElementById("bon"));

bulan.addEventListener("change",()=>{build();calc();});
tahun.addEventListener("change",()=>{build();calc();});
async function downloadJPG() {

    const area = document.getElementById("capture-area");

    const canvas = await html2canvas(area, {
        scale: window.devicePixelRatio * 3,
        useCORS: true,
        backgroundColor: "#ffffff",
        scrollX: 0,
        scrollY: 0
    });

    const link = document.createElement("a");

    link.download =
        `${nama.value || "Karyawan"}-${m[bulan.value]}-${tahun.value}.jpg`;

    link.href = canvas.toDataURL("image/jpeg", 1.0);

    link.click();
  
}
  
function resetApp(){


    if(!confirm("Reset semua data?")) return;

    data = {};

    localStorage.removeItem("AppDIGI");

    document.querySelectorAll("input").forEach(i=>{
        i.value="";
    });

    const now = new Date();

    bulan.value = now.getMonth();
    tahun.value = now.getFullYear();

    build();
    calc();

    alert("Data berhasil direset");
}
  
async function downloadPDF() {

    await document.fonts.ready;
    await new Promise(r => setTimeout(r, 500));

    const area = document.getElementById("capture-area");

    // 🔥 SIMPAN SCROLL POSISI
    const scrollY = window.scrollY;
    const scrollX = window.scrollX;

    window.scrollTo(0, 0);

    const canvas = await html2canvas(area, {
        scale: 2,
        useCORS: true,
        scrollX: 0,
        scrollY: -window.scrollY,
        windowWidth: document.documentElement.offsetWidth,
        windowHeight: document.documentElement.offsetHeight
    });

    window.scrollTo(scrollX, scrollY);

 const canvas = await html2canvas(area, {
    scale: window.devicePixelRatio * 3,
    useCORS: true,
    backgroundColor: "#ffffff",
    scrollX: 0,
    scrollY: 0
});

const imgData = canvas.toDataURL("image/png", 1.0);

const { jsPDF } = window.jspdf;
const pdf = new jsPDF("p", "mm", "a4");

const pdfWidth = 210;
const imgWidth = 190;
const imgHeight = (canvas.height * imgWidth) / canvas.width;

pdf.addImage(imgData, "PNG", 10, 10, imgWidth, imgHeight);

pdf.save(
    `${nama.value || "Karyawan"}-${m[bulan.value]}-${tahun.value}.pdf`
);

}
/* INIT */
load();

const now = new Date();
bulan.value = now.getMonth();
tahun.value = now.getFullYear();

build();
calc();
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('Service Worker terdaftar', reg))
      .catch(err => console.error('Gagal daftar SW', err));
  });
}
</script>

<script>
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
});

function installApp() {
  if (!deferredPrompt) {
    alert("Install belum tersedia, coba refresh halaman");
    return;
  }

  deferredPrompt.prompt();

  deferredPrompt.userChoice.then(() => {
    deferredPrompt = null;
  });
}
</script>

</body>
</html>
